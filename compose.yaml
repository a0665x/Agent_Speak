name: agent-speak

x-model-volume: &model-volume
  - ${AGENT_SPEAK_MODELS_PATH:-./models}:/app/models

services:
  model-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
      target: model-downloader
    image: agent-speak-model-downloader:local
    init: true
    restart: "no"
    command: ["--verify"]
    environment:
      HOME: /app/models/home
      HF_HOME: /app/models/huggingface
      XDG_CACHE_HOME: /app/models/cache
    volumes: *model-volume

  model-downloader:
    build:
      context: .
      dockerfile: Dockerfile
      target: model-downloader
    image: agent-speak-model-downloader:local
    profiles: ["models"]
    init: true
    restart: "no"
    command: ["--download-all"]
    environment:
      HOME: /app/models/home
      HF_HOME: /app/models/huggingface
      XDG_CACHE_HOME: /app/models/cache
    volumes: *model-volume

  asr-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: asr-runtime
    image: agent-speak-asr:local
    init: true
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "agent_speak.asr_worker:create_asr_worker", "--factory", "--host", "0.0.0.0", "--port", "8771"]
    environment:
      AGENT_SPEAK_SKIP_MODEL_BOOTSTRAP: "1"
      AGENT_SPEAK_ACCELERATOR: "${AGENT_SPEAK_EFFECTIVE_ACCELERATOR:-cpu}"
      AGENT_SPEAK_EFFECTIVE_ACCELERATOR: "${AGENT_SPEAK_EFFECTIVE_ACCELERATOR:-cpu}"
      AGENT_SPEAK_ASR_MODEL: "${AGENT_SPEAK_ASR_MODEL:-small}"
      AGENT_SPEAK_ASR_LANGUAGE: "${AGENT_SPEAK_ASR_LANGUAGE:-zh}"
      AGENT_SPEAK_ASR_COMPUTE_TYPE: "${AGENT_SPEAK_ASR_COMPUTE_TYPE:-int8}"
      AGENT_SPEAK_ASR_CUDA_COMPUTE_TYPE: "${AGENT_SPEAK_ASR_CUDA_COMPUTE_TYPE:-float16}"
      AGENT_SPEAK_ASR_CPU_THREADS: "${AGENT_SPEAK_ASR_CPU_THREADS:-4}"
      HOME: /app/models/home
      HF_HOME: /app/models/huggingface
      XDG_CACHE_HOME: /app/models/cache
    volumes: *model-volume
    depends_on:
      model-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8771/internal/v1/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 12

  correction-worker:
    image: "${AGENT_SPEAK_LLAMA_CPU_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}"
    init: true
    restart: unless-stopped
    command: ["-m", "/app/models/qwen/qwen2.5-1.5b-instruct-q4_k_m.gguf", "--host", "0.0.0.0", "--port", "8080", "--ctx-size", "4096", "--parallel", "1", "--n-predict", "256"]
    volumes:
      - ${AGENT_SPEAK_MODELS_PATH:-./models}:/app/models:ro
    depends_on:
      model-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 12

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-speak:local
    restart: unless-stopped
    init: true
    user: "${AGENT_SPEAK_UID:-1000}:${AGENT_SPEAK_GID:-1000}"
    group_add:
      - "${AGENT_SPEAK_AUDIO_GID:-29}"
    devices:
      - /dev/snd:/dev/snd
    ports:
      - "${AGENT_SPEAK_PUBLISH_HOST:-127.0.0.1}:${AGENT_SPEAK_PORT:-8765}:8765"
    environment:
      AGENT_SPEAK_HOST: 0.0.0.0
      AGENT_SPEAK_PORT: 8765
      AGENT_SPEAK_URL: http://127.0.0.1:8765
      AGENT_SPEAK_DATA_DIR: /app/data
      AGENT_SPEAK_RUNTIME_DIR: /app/runtime
      AGENT_SPEAK_MAX_AUDIO_BYTES: "${AGENT_SPEAK_MAX_AUDIO_BYTES:-8388608}"
      AGENT_SPEAK_MAX_AUDIO_SECONDS: "${AGENT_SPEAK_MAX_AUDIO_SECONDS:-30}"
      AGENT_SPEAK_VAD_RMS_THRESHOLD: "${AGENT_SPEAK_VAD_RMS_THRESHOLD:-0.015}"
      AGENT_SPEAK_MAX_SESSIONS: "${AGENT_SPEAK_MAX_SESSIONS:-100}"
      AGENT_SPEAK_MAX_SESSION_EVENTS: "${AGENT_SPEAK_MAX_SESSION_EVENTS:-128}"
      AGENT_SPEAK_MAX_EVENT_QUEUE: "${AGENT_SPEAK_MAX_EVENT_QUEUE:-64}"
      AGENT_SPEAK_MAX_ARTIFACTS: "${AGENT_SPEAK_MAX_ARTIFACTS:-100}"
      AGENT_SPEAK_ACCELERATOR: "${AGENT_SPEAK_ACCELERATOR:-auto}"
      AGENT_SPEAK_EFFECTIVE_ACCELERATOR: "${AGENT_SPEAK_EFFECTIVE_ACCELERATOR:-cpu}"
      AGENT_SPEAK_ASR_MODEL: "${AGENT_SPEAK_ASR_MODEL:-small}"
      AGENT_SPEAK_ASR_WORKER_URL: http://asr-worker:8771
      AGENT_SPEAK_CORRECTION_WORKER_URL: http://correction-worker:8080
      AGENT_SPEAK_CORRECTION_MODEL: "${AGENT_SPEAK_CORRECTION_MODEL:-Qwen2.5-1.5B-Instruct-Q4_K_M}"
      AGENT_SPEAK_TTS_MODEL_PATH: "${AGENT_SPEAK_TTS_MODEL_PATH:-models/piper/zh_CN-huayan-medium.onnx}"
      HOME: /app/models/home
      HF_HOME: /app/models/huggingface
      XDG_CACHE_HOME: /app/models/cache
    volumes:
      - ${AGENT_SPEAK_DATA_PATH:-./data}:/app/data
      - ${AGENT_SPEAK_RUNTIME_PATH:-./runtime}:/app/runtime
      - ${AGENT_SPEAK_MODELS_PATH:-./models}:/app/models
    depends_on:
      model-bootstrap:
        condition: service_completed_successfully
      asr-worker:
        condition: service_healthy
      correction-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/v1/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6

  gateway-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-speak:local
    profiles: ["test"]
    init: true
    network_mode: none
    environment:
      AGENT_SPEAK_SKIP_MODEL_BOOTSTRAP: "1"
      AGENT_SPEAK_DATA_DIR: /tmp/agent-speak-test/data
      AGENT_SPEAK_RUNTIME_DIR: /tmp/agent-speak-test/runtime
      HOME: /tmp/agent-speak-test/home
      HF_HOME: /tmp/agent-speak-test/huggingface
      XDG_CACHE_HOME: /tmp/agent-speak-test/cache

  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-test
    profiles: ["test"]
    init: true
    network_mode: none
    command: ["npm", "test"]
