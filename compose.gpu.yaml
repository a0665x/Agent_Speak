services:
  asr-worker:
    build:
      target: asr-runtime
      args:
        AGENT_SPEAK_IMAGE_VARIANT: nvidia
    image: agent-speak-asr:gpu-local
    runtime: nvidia
    environment:
      AGENT_SPEAK_ACCELERATOR: nvidia
      AGENT_SPEAK_EFFECTIVE_ACCELERATOR: nvidia
      NVIDIA_VISIBLE_DEVICES: "${AGENT_SPEAK_ASR_GPU_DEVICES:-all}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  correction-worker:
    image: "${AGENT_SPEAK_LLAMA_CUDA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}"
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "${AGENT_SPEAK_CORRECTION_GPU_DEVICES:-all}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  tts-worker:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "${AGENT_SPEAK_TTS_GPU_DEVICES:-all}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
